# Example hook configuration for operators.
# Copy the parts you want into either:
# - ~/.config/opencode/hook/hooks.yaml
# - <project>/.opencode/hook/hooks.yaml
#
# Current defaults in the runtime:
# - scope defaults to all
# - runIn defaults to current
# - conditions are optional
# - bash timeout defaults to 60000ms
#
# Migration notes:
# - use hooks.yaml, not hooks.md
# - use scope/runIn, not isMainSession
# - prefer file.changed for file automation

hooks:
  # Scope controls which session emits the event.
  - id: main-session-started
    event: session.created
    scope: main
    actions:
      - bash: 'echo "main session started: $OPENCODE_SESSION_ID"'

  - id: main-session-ended
    event: session.deleted
    scope: main
    actions:
      - bash: 'echo "main session ended: $OPENCODE_SESSION_ID"'

  # runIn controls where follow-up commands run.
  # This keeps review-pr attached to the root session even if a child session
  # triggered the hook.
  - id: lint-and-review-on-change
    event: file.changed
    scope: all
    runIn: main
    conditions: [hasCodeChange]
    actions:
      - bash:
          command: "npm run lint -- --fix"
          timeout: 30000
      - command:
          name: review-pr
          args: "main feature"

  - id: test-when-idle
    event: session.idle
    scope: main
    conditions: [hasCodeChange]
    actions:
      - bash: "npm test"

  # Desktop notification example for when the main session becomes idle.
  # Useful as a lightweight signal that the agent finished a burst of work.
  # On macOS, install terminal-notifier for clickable/focusable notifications:
  #   brew install terminal-notifier
  # Set OPENCODE_NOTIFY_DEBUG=1 while testing to write logs to
  # /tmp/opencode-notify.log.
  - id: notify-on-idle
    event: session.idle
    scope: main
    actions:
      - bash: "$HOME/.config/opencode/hook/notify.sh"

  # Minimal example showing that scope and runIn can be omitted.
  # This uses the defaults scope=all and runIn=current.
  - id: typecheck-on-change
    event: file.changed
    conditions: [hasCodeChange]
    actions:
      - bash: "npm run typecheck"

  - id: log-before-tools
    event: tool.before.*
    actions:
      - bash: |
          context=$(cat)
          echo "before tool: $(echo "$context" | jq -r '.tool_name')"

  # Useful for learning what the bash tool actually receives before execution.
  # Start with this logger, inspect /tmp/opencode-bash-hook.log, then tighten the
  # policy with a blocking hook once you know the command shapes you care about.
  - id: log-bash-commands
    event: tool.before.bash
    actions:
      - bash: |
          payload=$(cat)
          cmd=$(printf '%s' "$payload" | jq -r '.tool_args.command // empty')
          printf '[hook] bash command: %s\n' "$cmd" >> /tmp/opencode-bash-hook.log

  # Example blocking policy for dangerous bash commands. Exiting with status 2 in
  # tool.before.* prevents the tool from running.
  - id: block-git-push
    event: tool.before.bash
    actions:
      - bash: |
          payload=$(cat)
          cmd=$(printf '%s' "$payload" | jq -r '.tool_args.command // empty')

          if printf '%s' "$cmd" | grep -Eq '(^|[[:space:]])git[[:space:]]+push([[:space:]]|$)'; then
            echo "Blocked: git push is not allowed from OpenCode." >&2
            exit 2
          fi

  # Add action: stop when a blocked pre-tool hook should also abort the active
  # session instead of only blocking the current tool call.
  - id: block-and-stop-git-push
    event: tool.before.bash
    action: stop
    actions:
      - bash: |
          payload=$(cat)
          cmd=$(printf '%s' "$payload" | jq -r '.tool_args.command // empty')

          case "$cmd" in
            "git push"|git\ push\ *)
              echo "Blocked and stopping session: git push is not allowed from OpenCode." >&2
              exit 2
              ;;
          esac

  # Reusable hardcoded blocklist example. Edit BLOCKED_COMMANDS in the script to
  # control which bash commands are denied with a simple array like:
  #   BLOCKED_COMMANDS=(
  #     "git push"
  #     "git push --force"
  #   )
  - id: block-bash-commands-from-script
    event: tool.before.bash
    actions:
      - bash: "$HOME/.config/opencode/hook/block-commands.sh"

  - id: block-sensitive-writes
    event: tool.before.write
    actions:
      - bash: |
          file=$(cat | jq -r '.tool_args.filePath // .tool_args.file_path // .tool_args.path')
          if echo "$file" | grep -qE '\.(env|pem|key)$'; then
            echo "Cannot modify sensitive files: $file" >&2
            exit 2
          fi

  # Advanced: tool.after hooks run for every matching tool execution.
  # Prefer file.changed for file automation so hooks only see explicit mutation
  # payloads from supported file-changing tools.
  - id: audit-tool-usage
    event: tool.after.*
    actions:
      - bash: |
          context=$(cat)
          echo "advanced after hook for $(echo "$context" | jq -r '.tool_name')"

  # Recommended atomic commit wiring: trigger on file.changed instead of
  # tool.after.* so the script only stages paths reported by the runtime.
  - id: atomic-commit-on-change
    event: file.changed
    scope: main
    conditions: [hasCodeChange]
    actions:
      - bash: "$HOME/.config/opencode/hook/atomic-commit.sh"

  # async: true makes the hook return immediately without blocking the agent.
  # Use this for side-effect work that doesn't need to complete before the
  # next tool call. Rapid-fire edits are serialized per session — each run
  # waits for the previous one to finish before starting.
  # async is NOT allowed on tool.before events (blocking requires sync).
  - id: async-atomic-commit
    event: file.changed
    async: true
    scope: main
    conditions: [hasCodeChange]
    actions:
      - bash: "$HOME/.config/opencode/hook/atomic-commit-async.sh"

# Override examples belong in a later file, such as <project>/.opencode/hook/hooks.yaml,
# so they can target ids that were already loaded from an earlier global file.
#
# hooks:
#   - override: lint-and-review-on-change
#     event: file.changed
#     scope: main
#     conditions: [hasCodeChange]
